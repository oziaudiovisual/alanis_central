version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/alanis_central
      SESSION_SECRET: dev-secret-change-me
      WEBHOOK_SECRET: dev-webhook-secret
      RESEND_API_KEY: re_Bf242Uw4_664wUw8dBFf9YBnEDip8UxD1
      NODE_ENV: development
      PORT: 3000
      ADMIN_EMAIL: mariolellis@gmail.com
      ADMIN_PASSWORD: BemMelhorAgora2026@
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: node --watch src/index.js

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alanis_central
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
